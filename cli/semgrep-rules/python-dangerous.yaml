# code-scanner — bundled Semgrep ruleset (pinned, offline, deterministic).
#
# Original rules authored for code-scanner, License: PolyForm Noncommercial 1.0.0
# (see repo LICENSE). A small, high-signal set so the deterministic Semgrep tier
# runs fully offline (no `--config auto` registry fetch) and reproducibly — the
# gate's exit code must not depend on registry rules drifting over time.
#
# Extend by dropping more rule files in this directory, or override entirely with
# --semgrep-config / CODE_SCANNER_SEMGREP_CONFIG.

rules:
  - id: code-scanner.python.unsafe-yaml-load
    languages: [python]
    severity: ERROR
    message: >-
      yaml.load() without a safe Loader deserializes arbitrary Python objects and
      can execute code. Use yaml.safe_load() or Loader=yaml.SafeLoader.
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader)

  - id: code-scanner.python.subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: >-
      subprocess called with shell=True invokes a shell; if any argument is
      attacker-influenced this is a command-injection sink. Pass an argv list and
      shell=False.
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: subprocess.check_output(..., shell=True, ...)

  - id: code-scanner.python.eval-exec-call
    languages: [python]
    severity: ERROR
    message: >-
      eval()/exec() executes arbitrary code; never call it on data that could be
      influenced by input.
    metadata:
      category: security
      cwe: "CWE-95: Eval Injection"
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: exec(...)

  - id: code-scanner.python.pickle-loads
    languages: [python]
    severity: WARNING
    message: >-
      pickle.load()/loads() deserializes arbitrary objects and can execute code on
      untrusted input. Prefer a safe format (json) for untrusted data.
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
    patterns:
      - pattern-either:
          - pattern: pickle.load(...)
          - pattern: pickle.loads(...)
